packages:
  - playground

allowBuilds:
  esbuild: true
  simple-git-hooks: true

overrides:
  oxc-walker: link:.
  vite: "catalog:"
  vitest: "catalog:"

verifyDepsBeforeRun: install
trustPolicy: no-downgrade
minimumReleaseAge: 60
blockExoticSubdeps: false
minimumReleaseAgeExclude:
  - vite-plus
  - vite
  - vitest
  - "@voidzero-dev/*"
  - "@oxc-project/*"
  - "@oxlint/*"
  - oxlint
  - oxfmt
  - oxlint-tsgolint
catalog:
  vite: https://pkg.pr.new/voidzero-dev/vite-plus/@voidzero-dev/vite-plus-core@1738
  vitest: https://pkg.pr.new/voidzero-dev/vite-plus/@voidzero-dev/vite-plus-test@1738
  vite-plus: https://pkg.pr.new/voidzero-dev/vite-plus@1738
peerDependencyRules:
  allowAny:
    - vite
    - vitest
  allowedVersions:
    vite: "*"
    vitest: "*"
